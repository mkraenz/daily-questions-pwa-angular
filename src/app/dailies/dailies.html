<div class="max-w-2xl mx-auto p-6">
  @if (view() === 'question') {
    <app-question-view
      [question]="currentQuestion()"
      [existingAnswer]="answers().get(currentQuestion().id) || null"
      (answered)="onAnswer($event)"
    />
  } @else {
    <app-summary-view
      [questions]="activeQuestions()"
      [answers]="answers()"
      (edit)="onEdit($event)"
      (confirm)="onConfirm()"
    />
  }

  <app-toast [visible]="showToast()" message="Responses saved!" />
</div>
