<div class="space-y-6">
  <h2 class="text-2xl font-bold">Summary</h2>

  <div class="space-y-3">
    @for (question of questions(); track question.id) {
      <button
        (click)="onEditQuestion(question.id)"
        class="w-full block p-4 border border-gray-200 rounded-lg hover:bg-gray-50 text-left transition"
      >
        <p class="font-semibold">{{ question.title }}</p>
        <p class="text-gray-600 text-sm mt-1">{{ answers().get(question.id) }}</p>
      </button>
    }
  </div>

  <button
    (click)="onConfirm()"
    class="w-full bg-green-500 text-white py-2 rounded-lg font-medium hover:bg-green-600"
  >
    Confirm
  </button>
</div>
